name: Arb Sniper Bot

on:
  schedule:
    - cron: '*/30 * * * *'  # Runs every 30 minutes
  workflow_dispatch: # Keeps your manual run button

permissions:
  contents: write

# 🛠️ THE FIX: This forces GitHub to use the latest Node 24 and silences the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      # 🛠️ Bumped to v5 for the latest updates
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Cloud Scan & Publish
        env:
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
          DASHBOARD_PASS: ${{ secrets.DASHBOARD_PASS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python arb_sniper.py

      - name: Save Data to GitHub
        run: |
          git config --global user.name "Arb Sniper Bot"
          git config --global user.email "bot@arbsniper.com"
          
          git add index.html api_state.json alert_cache.json || true
          
          export TZ="Asia/Kolkata"
          git commit -m "Auto-Scan Completed [$(date '+%Y-%m-%d %I:%M %p IST')]" || exit 0
          
          git pull --rebase origin main
          git push origin main
