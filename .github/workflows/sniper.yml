name: Arb Sniper Bot

on:
  schedule:
    - cron: '*/30 * * * *'  # Runs every 30 minutes
  workflow_dispatch: # Keeps your manual run button

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Crucial for pulling new changes correctly

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Cloud Scan & Publish
        env:
          # 🔐 Pulling all 3 Bank-Grade Secrets from GitHub
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
          DASHBOARD_PASS: ${{ secrets.DASHBOARD_PASS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python arb_sniper.py

      - name: Save Data to GitHub
        run: |
          git config --global user.name "Arb Sniper Bot"
          git config --global user.email "bot@arbsniper.com"
          
          # Add files safely (ignores them if they don't exist yet)
          git add index.html api_state.json alert_cache.json || true
          
          # Force the server to use Indian Standard Time for the commit log
          export TZ="Asia/Kolkata"
          git commit -m "Auto-Scan Completed [$(date '+%Y-%m-%d %I:%M %p IST')]" || exit 0
          
          # 👇 THE CRITICAL FIX: Download manual code edits before uploading
          git pull --rebase origin main
          
          # Finally, push the dashboard to the web
          git push origin main
