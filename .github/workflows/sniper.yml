name: Arbitrage Scanner

on:
  schedule:
    # Run every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cryptography

      - name: Run arbitrage scanner
        env:
          DASHBOARD_PASS: ${{ secrets.DASHBOARD_PASS || 'admin123' }}
        run: |
          python arb_sniper.py

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Arbitrage Scanner Bot"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet index.html api_state.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git pull --rebase origin main || true
          git add index.html api_state.json
          
          # Format commit message with IST timestamp
          IST_TIME=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S IST')
          git commit -m "🤖 Auto-update: Arbitrage scan results [$IST_TIME]" || true
          
          # Push with retry logic
          for i in {1..3}; do
            if git push origin main; then
              echo "✓ Push successful"
              exit 0
            else
              echo "Push attempt $i failed, retrying..."
              sleep 5
              git pull --rebase origin main || true
            fi
          done
          
          echo "⚠ Push failed after 3 attempts"
          exit 1

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: |
            index.html
            api_state.json
          retention-days: 7

      - name: Job summary
        if: always()
        run: |
          echo "## 📊 Arbitrage Scanner Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S IST')" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f api_state.json ]; then
            echo "### API State" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            cat api_state.json >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi