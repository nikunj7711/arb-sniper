name: Arb Sniper Bot

on:
  schedule:
    - cron: '*/15 * * * *' # Runs exactly every 15 minutes automatically
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Cloud Scan & Sync Terminal
        env:
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
        run: python arb_sniper.py

      - name: Publish Global Snapshot
        run: |
          git config --global user.name "Arb Sniper Bot"
          git config --global user.email "bot@arbsniper.com"
          git add index.html api_state.json
          git commit -m "Global Sync [$(date '+%Y-%m-%d %H:%M IST')]" || exit 0
          git push
