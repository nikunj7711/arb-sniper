name: Arb Sniper Elite Runner

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  snipe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Arb Sniper Engine
        env:
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }} # Add this in GitHub Secrets
        run: python arb_sniper.py

      - name: Commit and Push HTML Dashboard
        run: |
          git config --global user.name "ArbBot"
          git config --global user.email "bot@arbsniper.local"
          git add index.html api_state.json
          git commit -m "update: Latest Arb Data" || echo "No changes to commit"
          git push
