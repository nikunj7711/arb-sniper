name: Arb Sniper Bot

on:
  schedule:
    - cron: '0 * * * *' # Runs at the start of every hour (e.g. 1:00, 2:00)
  workflow_dispatch: # Gives you a manual button to force a scan immediately

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Cloud Scan & Publish
        env:
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
        run: python arb_sniper.py

      - name: Save Data to GitHub
        run: |
          git config --global user.name "Arb Sniper Bot"
          git config --global user.email "bot@arbsniper.com"
          git add index.html api_state.json alert_cache.json
          git commit -m "Auto-Scan Completed [$(date '+%Y-%m-%d %H:%M IST')]" || exit 0
          git push
