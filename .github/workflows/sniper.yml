name: Arb Sniper Bot

on:
  schedule:
    - cron: '0 * * * *' # Runs at the top of every hour automatically
  workflow_dispatch: # Allows manual button clicks from GitHub

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Cloud Scan & Build Terminal
        env:
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
        run: python arb_sniper.py

      - name: Save Neural Memory & Publish
        run: |
          git config --global user.name "Arb Sniper Bot"
          git config --global user.email "bot@arbsniper.com"
          git add index.html *.json
          git commit -m "Auto-Sweep & State Save [$(date '+%Y-%m-%d %H:%M IST')]" || exit 0
          git push
