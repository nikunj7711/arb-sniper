name: Arb Sniper Bot

on:
  schedule:
    - cron: '*/30 * * * *'  
  workflow_dispatch: 

# 🛠️ FIX 1: This explicitly gives the bot permission to push the HTML to your repo (Fixes the 403 Error)
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Updated to match your logs

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Cloud Scan & Publish
        env:
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
          DASHBOARD_PASS: ${{ secrets.DASHBOARD_PASS }}
        run: python arb_sniper.py

      - name: Save Data to GitHub
        run: |
          git config --global user.name "Arb Sniper Bot"
          git config --global user.email "bot@arbsniper.com"
          
          # 🛠️ FIX 2: Correct Order of Operations
          
          # Step A: ADD AND COMMIT FIRST
          git add index.html api_state.json || true
          IST_TIME=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %I:%M %p IST')
          git commit -m "🤖 Auto-update: Arbitrage scan results [$IST_TIME]" || true
          
          # Step B: PULL REBASE SECOND (Now it's safe because files are committed)
          git pull --rebase origin main || true
          
          # Step C: PUSH WITH RETRY
          for i in {1..3}; do
            if git push origin main; then
              echo "✓ Push successful"
              exit 0
            else
              echo "Push attempt $i failed, retrying..."
              sleep 5
              git pull --rebase origin main || true
            fi
          done
          
          echo "⚠ Push failed after 3 attempts"
          exit 1
