name: Arb Sniper Bot

on:
  workflow_dispatch: # Manual trigger only. The browser handles the actual scanning loops.

permissions:
  contents: write

jobs:
  build-spa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build Web Terminal (Inject Keys)
        env:
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
        run: python arb_sniper.py

      - name: Publish Dashboard to GitHub Pages
        run: |
          git config --global user.name "Arb Sniper Bot"
          git config --global user.email "bot@arbsniper.com"
          git add index.html
          git commit -m "Deploy Pure SPA Terminal [$(date '+%Y-%m-%d %H:%M IST')]" || exit 0
          git push
