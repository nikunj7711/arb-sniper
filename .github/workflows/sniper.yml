name: Arb Sniper Bot

on:
  schedule:
    - cron: '0 */8 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run Sniper & Generate Dashboard
        run: python arb_sniper.py

      - name: Publish Dashboard to Web
        run: |
          git config --global user.name "Arb Sniper Bot"
          git config --global user.email "bot@arbsniper.com"
          git add index.html
          git commit -m "Update live dashboard" || exit 0
          git push
