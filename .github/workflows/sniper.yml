name: ⚡ Arb Sniper v5.0 — Auto Scan

on:
  schedule:
    # Runs every 30 minutes
    - cron: "0,30 * * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual trigger reason"
        required: false
        default: "Manual run"

# 🛠️ Required so the bot is legally allowed to push code to your repo
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"
  TZ: "Asia/Kolkata"

jobs:
  scan:
    name: 🎯 Run Elite Quant Engine
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python Setup ──────────────────────────────────────
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Install Dependencies ──────────────────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ── 4. Restore api_state.json if cached ─────────────────
      - name: 📂 Restore API state cache
        uses: actions/cache@v4
        with:
          path: api_state.json
          key: api-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            api-state-${{ runner.os }}-

      # ── 5. Run the Scanner ───────────────────────────────────
      - name: ⚡ Run Arb Sniper v5.0
        env:
          DASHBOARD_PASS: ${{ secrets.DASHBOARD_PASS }}
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ARB SNIPER v5.0 — Scanning global sports markets..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          python arb_sniper.py
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Scan complete. Preparing to commit 8-Theme Dashboard..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 6. Verify Output ─────────────────────────────────────
      - name: ✅ Verify generated files
        run: |
          if [ ! -f index.html ]; then
            echo "❌ ERROR: index.html was not generated!" && exit 1
          fi
          echo "✅ index.html: $(wc -c < index.html) bytes"
          if [ -f api_state.json ]; then
            echo "✅ api_state.json:"
            cat api_state.json
          fi

      # ── 7. Commit & Push ─────────────────────────────────────
      - name: 📤 Commit dashboard to main
        run: |
          git config --global user.name  "Arb Sniper Bot"
          git config --global user.email "arb-sniper@github-actions.bot"

          # Stage the generated files
          git add index.html api_state.json || true

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "ℹ️  No changes detected — skipping commit."
            exit 0
          fi

          # Generate IST timestamp for commit message
          IST_TIME=$(TZ='Asia/Kolkata' date '+%d %b %Y %I:%M %p IST')
          
          # Simplified commit message to avoid regex crashing
          COMMIT_MSG="⚡ Arb Sniper v5.0 | ${IST_TIME} | UI Updated"
          echo "Commit message: ${COMMIT_MSG}"

          # 1. Commit the files FIRST
          git commit -m "${COMMIT_MSG}"

          # 2. Pull from the server SECOND
          git pull --rebase origin main || true

          # 3. Push to live site with a retry loop
          for i in {1..3}; do
            if git push origin main; then
              echo "✓ Push successful"
              exit 0
            else
              echo "Push attempt $i failed, retrying..."
              sleep 5
              git pull --rebase origin main || true
            fi
          done
          
          echo "⚠ Push failed after 3 attempts"
          exit 1

      # ── 8. Summary ───────────────────────────────────────────
      - name: 📊 Job Summary
        if: always()
        run: |
          echo "## ⚡ Arb Sniper v5.0 Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Run Time (IST)** | $(TZ='Asia/Kolkata' date '+%d %b %Y %I:%M %p') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f api_state.json ]; then
            REMAINING=$(python -c "import json; d=json.load(open('api_state.json')); print(d.get('remaining_requests','?'))" 2>/dev/null || echo '?')
            echo "| **API Requests Remaining** | ${REMAINING} |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f index.html ]; then
            SIZE=$(wc -c < index.html)
            echo "| **Dashboard Size** | ${SIZE} bytes |" >> $GITHUB_STEP_SUMMARY
            echo "| **Status** | ✅ Dashboard generated successfully |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Status** | ❌ Dashboard generation failed |" >> $GITHUB_STEP_SUMMARY
          fi
